spring:
  application:
    name: assignement-services

  datasource:
    url: jdbc:postgresql://${TIDB_HOST:localhost}:${TIDB_PORT:6543}/${TIDB_DB:fleetmaster_db}?currentSchema=assignements_db&sslmode=disable
    username: ${TIDB_USER:admin}
    password: ${TIDB_PASSWORD:admin_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

server:
  port: ${PORT:8080}

#Eureka: Servicio de registro de direcciones para la ApiGateway
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    # Esto es vital en Cloud Run para que Eureka no use IPs internas que cambian
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
#FeignClient: Servicio que permite la comunicacion entre microservicios
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET}
